{% extends "base.html" %}
{% block content %}

<h1>Item Presets</h1>

<!-- Create new preset -->
<form action="{{ url_for('presets.create_preset') }}" method="POST" style="margin-bottom:20px;">
    <input type="text" name="name" placeholder="Preset name" required>
    <button type="submit">Create</button>
</form>

<!-- List presets -->
<ul>
{% for p in presets %}
    <li>
        {{ p["name"] }}

        <form action="{{ url_for('presets.delete_preset', preset_id=p['id']) }}" method="POST" style="display:inline;">
            <button type="submit" class="icon-button" title="Delete Preset">❌</button>
        </form>

        <a href="{{ url_for('presets.edit_preset', preset_id=p['id']) }}">Edit</a>
    </li>
{% endfor %}
</ul>

{% endblock %}
